name: the first workflow
on: push

jobs:
    first_job:
        runs-on: ubuntu-latest
        steps:
        - name: Welcome
          run: echo "Hello World from GitHub Actions"
        - name: pwd
          run: pwd
        - name: Checkout
          uses: actions/checkout@v6.0.2
        - name: List and read file
          run: |
            echo "Running some commands"
            ls -lart
            pwd
            cat README.md
        - name: Generate ASCII Artwork
          run: cowsay -f dragon "Run for cover, Hello! I'm a Dragon... grrrr!" >> dragon.txt

