name: Generate ASCII ArtWork executing sh
on: push

jobs:
    ascii_job:
        runs-on: ubuntu-latest
        steps:
        - name: Welcome
          run: echo "Hello World! from GitHub Actions"

        - name: Checkout
          uses: actions/checkout@v6.0.2

        - name: pwd and ls
          run: |
            pwd
            ls -lart

        - name: Install Cowsay Program
          run: sudo apt-get install cowsay -y
            
        - name: Generate ASCII Artwork
          run: cowsay -f dragon "Run for cover, Hello! I'm a Dragon... grrrr!" >> dragon.txt
        
        - name: Read Dragon File
          run: cat dragon.txt

        - name: List Repo Files
          run: ls -ltra

        - name: Executing Shell Script
          run: |
            chmod +x ascii.script.sh
            ./ascii.script.sh
            sleep 10

    ascii_job2:
        runs-on: ubuntu-latest
        steps:
        - name: Welcome
          run: echo "Hello World! from GitHub Actions"

        - name: Checkout
          uses: actions/checkout@v6.0.2

        - name: pwd and ls
          run: |
            pwd
            ls -lart

        - name: Executing Shell Script
          run: |
            chmod +x ascii.script.sh
            ./ascii.script2.sh
            sleep10

    test_job:
        needs: ascii_job
        runs-on: ubuntu-latest
        steps:
        - name: Welcome
          run: echo "Hello World! from GitHub Actions"

        - name: sleep 30 secs
          run: sleep 30
        - name: Test dragon file exists
          run: grep -i "dragon" dragon.txt

    test_job2:
        runs-on: ubuntu-latest
        steps:
        - name: Welcome
          run: echo "Hello World! from GitHub Actions"

        - name: sleep 15 secs
          run: sleep 15
        - name: Test dino file exists
          run: grep -i "dino" dino.txt

    deploy_job:
        needs: [test_job, test_job2]
        runs-on: ubuntu-latest
        steps:
        - name: text
          run: echo "Deploying"

        - name: test file dragon
          run: cat dragon.txt

        - name: test dino file
          run: cat dino.txt
          


